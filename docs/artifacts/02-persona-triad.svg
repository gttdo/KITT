<svg width="960" height="470" viewBox="0 0 960 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="959" height="469" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="44" y="46" font-size="22" font-weight="600" fill="#20303f">Three roles, one auditable protocol</text>
  <text x="44" y="72" font-size="14" fill="#5b6b7b">The designer builds it, the coordinator must execute it, the reviewer signs it off — all on the same provenance record</text>

  <!-- spokes -->
  <line x1="480" y1="196" x2="480" y2="220" stroke="#cbd5e1"/>
  <line x1="272" y1="324" x2="446" y2="280" stroke="#cbd5e1"/>
  <line x1="688" y1="324" x2="514" y2="280" stroke="#cbd5e1"/>

  <!-- hub -->
  <circle cx="480" cy="256" r="36" fill="#e6f2ef" stroke="#3f8c84"/>
  <text x="480" y="254" text-anchor="middle" font-size="15" font-weight="600" fill="#3f8c84">KITT</text>
  <text x="480" y="270" text-anchor="middle" font-size="9.5" fill="#3f8c84">protocol</text>
  <text x="480" y="312" text-anchor="middle" font-size="11" fill="#5b6b7b">+ shared provenance record</text>

  <!-- spoke labels -->
  <rect x="424" y="196" width="112" height="16" rx="3" fill="#ffffff"/>
  <text x="480" y="208" text-anchor="middle" font-size="11" fill="#5b6b7b">designs the SoA</text>
  <rect x="300" y="290" width="108" height="16" rx="3" fill="#ffffff"/>
  <text x="354" y="302" text-anchor="middle" font-size="11" fill="#5b6b7b">flags site burden</text>
  <rect x="552" y="290" width="118" height="16" rx="3" fill="#ffffff"/>
  <text x="611" y="302" text-anchor="middle" font-size="11" fill="#5b6b7b">audits provenance</text>

  <!-- DESIGNER -->
  <rect x="368" y="86" width="224" height="106" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="384" y="100" width="104" height="18" rx="5" fill="#e6f2ef"/>
  <text x="436" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#3f8c84" letter-spacing="0.5">DESIGNER</text>
  <text x="384" y="142" font-size="14.5" font-weight="600" fill="#20303f">Maya Okafor</text>
  <text x="384" y="159" font-size="11.5" fill="#5b6b7b">Clinical Study Designer</text>
  <line x1="384" y1="168" x2="576" y2="168" stroke="#eef2f6"/>
  <text x="384" y="184" font-size="11" fill="#5b6b7b">Needs: speed + a defensible, lean SoA</text>

  <!-- COORDINATOR -->
  <rect x="56" y="324" width="224" height="106" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="72" y="338" width="118" height="18" rx="5" fill="#f9f2e2"/>
  <text x="131" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#cf9c46" letter-spacing="0.5">COORDINATOR</text>
  <text x="72" y="380" font-size="14.5" font-weight="600" fill="#20303f">Sam Rivera</text>
  <text x="72" y="397" font-size="11.5" fill="#5b6b7b">Site Study Coordinator (CRC)</text>
  <line x1="72" y1="406" x2="264" y2="406" stroke="#eef2f6"/>
  <text x="72" y="422" font-size="11" fill="#5b6b7b">Needs: an executable, low-burden protocol</text>

  <!-- REVIEWER -->
  <rect x="680" y="324" width="224" height="106" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="696" y="338" width="98" height="18" rx="5" fill="#ebf4ef"/>
  <text x="745" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#6cae8c" letter-spacing="0.5">REVIEWER</text>
  <text x="696" y="380" font-size="14.5" font-weight="600" fill="#20303f">Dr. Elena Reyes</text>
  <text x="696" y="397" font-size="11.5" fill="#5b6b7b">Regulatory / Quality</text>
  <line x1="696" y1="406" x2="888" y2="406" stroke="#eef2f6"/>
  <text x="696" y="422" font-size="11" fill="#5b6b7b">Needs: full auditability before sign-off</text>
</svg>
