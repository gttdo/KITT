  <!-- KITT v2 -->
  <circle cx="700" cy="200" r="16" fill="#e6f2ef"/>
  <circle cx="700" cy="200" r="9" fill="#3f8c84"/>
  <text x="700" y="178" text-anchor="middle" font-size="15" font-weight="600" fill="#3f8c84">KITT v2</text>

  <text x="44" y="578" font-size="12" fill="#94a3b8">Faro owns data-driven SoA design; the EDC platforms own the build. None own per-decision provenance at design time.</text>
