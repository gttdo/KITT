<svg width="960" height="466" viewBox="0 0 960 466" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="959" height="465" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="40" y="46" font-size="22" font-weight="600" fill="#20303f">Design palette — muted, clinical, calm</text>
  <text x="40" y="72" font-size="14" fill="#5b6b7b">Desaturated cool tones; neutrals carry the UI, accents only mark meaning. The convention for regulated health software.</text>

  <!-- Row 1: provenance -->
  <text x="40" y="106" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.6">PROVENANCE SOURCES</text>
  <g>
    <rect x="40" y="116" width="68" height="46" rx="8" fill="#8479bd"/>
    <text x="40" y="182" font-size="12.5" font-weight="600" fill="#20303f">AI-drafted</text>
    <text x="40" y="198" font-size="11" font-family="monospace" fill="#94a3b8">#8479bd</text>
  </g>
  <g>
    <rect x="200" y="116" width="68" height="46" rx="8" fill="#5b6776"/>
    <text x="200" y="182" font-size="12.5" font-weight="600" fill="#20303f">Human</text>
    <text x="200" y="198" font-size="11" font-family="monospace" fill="#94a3b8">#5b6776</text>
  </g>
  <g>
    <rect x="360" y="116" width="68" height="46" rx="8" fill="#54a298"/>
    <text x="360" y="182" font-size="12.5" font-weight="600" fill="#20303f">Library</text>
    <text x="360" y="198" font-size="11" font-family="monospace" fill="#94a3b8">#54a298</text>
  </g>
  <g>
    <rect x="520" y="116" width="68" height="46" rx="8" fill="#6f8fc0"/>
    <text x="520" y="182" font-size="12.5" font-weight="600" fill="#20303f">Site feedback</text>
    <text x="520" y="198" font-size="11" font-family="monospace" fill="#94a3b8">#6f8fc0</text>
  </g>

  <!-- Row 2: risk + brand -->
  <text x="40" y="234" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.6">RISK SEMANTICS  ·  BRAND</text>
  <g>
    <rect x="40" y="244" width="68" height="46" rx="8" fill="#cf6f74"/>
    <text x="40" y="310" font-size="12.5" font-weight="600" fill="#20303f">Risk · High</text>
    <text x="40" y="326" font-size="11" font-family="monospace" fill="#94a3b8">#cf6f74</text>
  </g>
  <g>
    <rect x="200" y="244" width="68" height="46" rx="8" fill="#cf9c46"/>
    <text x="200" y="310" font-size="12.5" font-weight="600" fill="#20303f">Risk · Medium</text>
    <text x="200" y="326" font-size="11" font-family="monospace" fill="#94a3b8">#cf9c46</text>
  </g>
  <g>
    <rect x="360" y="244" width="68" height="46" rx="8" fill="#6cae8c"/>
    <text x="360" y="310" font-size="12.5" font-weight="600" fill="#20303f">Risk · Low / good</text>
    <text x="360" y="326" font-size="11" font-family="monospace" fill="#94a3b8">#6cae8c</text>
  </g>
  <g>
    <rect x="520" y="244" width="68" height="46" rx="8" fill="#3f8c84"/>
    <text x="520" y="310" font-size="12.5" font-weight="600" fill="#20303f">Brand / CTA</text>
    <text x="520" y="326" font-size="11" font-family="monospace" fill="#94a3b8">#3f8c84</text>
  </g>

  <!-- Row 3: surfaces -->
  <text x="40" y="362" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.6">SURFACES &amp; INK</text>
  <g>
    <rect x="40" y="372" width="68" height="46" rx="8" fill="#2a3646"/>
    <text x="40" y="438" font-size="12.5" font-weight="600" fill="#20303f">Ink (top bar)</text>
    <text x="40" y="454" font-size="11" font-family="monospace" fill="#94a3b8">#2a3646</text>
  </g>
  <g>
    <rect x="200" y="372" width="68" height="46" rx="8" fill="#f4f6f8" stroke="#cbd5e1"/>
    <text x="200" y="438" font-size="12.5" font-weight="600" fill="#20303f">Page</text>
    <text x="200" y="454" font-size="11" font-family="monospace" fill="#94a3b8">#f4f6f8</text>
  </g>
  <g>
    <rect x="360" y="372" width="68" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="360" y="438" font-size="12.5" font-weight="600" fill="#20303f">Surface</text>
    <text x="360" y="454" font-size="11" font-family="monospace" fill="#94a3b8">#ffffff</text>
  </g>
  <g>
    <rect x="520" y="372" width="68" height="46" rx="8" fill="#e2e8f0" stroke="#cbd5e1"/>
    <text x="520" y="438" font-size="12.5" font-weight="600" fill="#20303f">Border</text>
    <text x="520" y="454" font-size="11" font-family="monospace" fill="#94a3b8">#e2e8f0</text>
  </g>

  <!-- note -->
  <line x1="640" y1="116" x2="640" y2="418" stroke="#eef2f6"/>
  <text x="664" y="124" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">PRINCIPLE</text>
  <text x="664" y="150" font-size="13" font-weight="600" fill="#20303f">Each accent also has a soft</text>
  <text x="664" y="168" font-size="13" font-weight="600" fill="#20303f">tint for fills &amp; badges.</text>
  <text x="664" y="196" font-size="12" fill="#5b6b7b">e.g. AI #8479bd pairs with</text>
  <text x="664" y="213" font-size="12" fill="#5b6b7b">tint #f0eef9 behind a label.</text>
  <text x="664" y="248" font-size="12" fill="#5b6b7b">Saturated fills are reserved for</text>
  <text x="664" y="265" font-size="12" fill="#5b6b7b">the single most important signal</text>
  <text x="664" y="282" font-size="12" fill="#5b6b7b">on screen — never for chrome.</text>
  <text x="664" y="318" font-size="12" fill="#5b6b7b">Type: Inter (400 / 500 / 600).</text>
  <text x="664" y="335" font-size="12" fill="#5b6b7b">Numerals are tabular for the</text>
  <text x="664" y="352" font-size="12" fill="#5b6b7b">live risk / $ figures.</text>
</svg>
